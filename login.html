<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
*{box-sizing:border-box}
body{font-family:Arial,sans-serif;margin:0;color:#102018;line-height:1.5}
header,footer{background:#0b5e3c;color:white;text-align:center;padding:14px 16px}
h1{font-size:clamp(1.6rem,7vw,2.2rem);margin:0}
form{width:min(92%,360px);margin:24px auto;padding:18px;background:white;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
input,button{width:100%;padding:11px 12px;margin:8px 0;border-radius:8px;border:1px solid #d9e2dc;font:inherit}
button{background:#0b5e3c;color:white;border:0;font-weight:700;cursor:pointer}
footer{font-size:.9rem}
</style>

<script>
function login(){
alert("Login Successful");
}
</script>
</head>

<body>

<header><h1>Student Login</h1></header>

<form>
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<button onclick="login()">Login</button>
</form>

<footer>© Tajweed-ul-Quran</footer>

</body>
</html>
